# Render.com 배포 설정 — 2인용 온라인 대전 릴레이 서버
# 사용법: render.com → New → Blueprint → 이 저장소 연결 → 배포
# 배포되면 wss://feast-of-memory.onrender.com 주소로 접속 가능
services:
  - type: web
    name: feast-of-memory
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
