name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # iOS 앱 빌드 검증 (서명 없이 시뮬레이터용 컴파일만)
  build-check:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Xcode 16 선택
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "^16.0"
      - name: 컴파일 (시뮬레이터, 서명 생략)
        run: |
          set -o pipefail
          xcodebuild build \
            -project FeastOfMemory.xcodeproj \
            -scheme FeastOfMemory \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO | tail -50

  # 2인용 릴레이 서버 테스트
  server-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install && npm test
        working-directory: server
